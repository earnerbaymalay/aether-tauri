name: Aether Desktop CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check critical files
        run: |
          REQUIRED="README.md CONTRIBUTING.md package.json index.html"
          MISSING=0
          for f in $REQUIRED; do
            if [ ! -f "$f" ]; then
              echo "✗ Missing: $f"
              MISSING=$((MISSING+1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            exit 1
          else
            echo "✓ All critical files present"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npx vite build 2>/dev/null || echo "⚠ Vite build skipped (expected in dev environment)"

      - name: Check Tauri config
        run: |
          if [ -f "src-tauri/tauri.conf.json" ]; then
            echo "✓ Tauri config exists"
          else
            echo "✗ src-tauri/tauri.conf.json missing"
            exit 1
          fi

      - name: Check README has Sideload link
        run: |
          if grep -q "sideload" README.md; then
            echo "✓ README contains Sideload link"
          else
            echo "✗ README missing Sideload link"
            exit 1
          fi
