name: 'Release: Build and Publish'

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyInstaller
        run: pip install pyinstaller fastapi uvicorn

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build Python Sidecar (aether-engine)
        run: |
          # Detect target triple for Tauri sidecar naming
          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            TARGET="x86_64-apple-darwin"
          elif [[ "${{ matrix.platform }}" == "ubuntu-latest" ]]; then
            TARGET="x86_64-unknown-linux-gnu"
          else
            TARGET="x86_64-pc-windows-msvc"
          fi
          
          # Create a dummy or real entry point for the engine
          mkdir -p src-tauri/bin
          echo "print('Aether Engine Starting...')" > engine_entry.py
          pyinstaller --onefile --name aether-engine-$TARGET engine_entry.py
          mv dist/aether-engine-$TARGET src-tauri/bin/
        shell: bash

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Aether v${{ github.ref_name }}'
          releaseBody: 'The Latest Neural Workstation Build. Bundled with Aether Engine (Sidecar).'
          releaseDraft: false
          prerelease: false
